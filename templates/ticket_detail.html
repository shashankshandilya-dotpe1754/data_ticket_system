<!-- ===========================
     Tom Select
=========================== -->

<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>


<!-- ===========================
     Quill
=========================== -->

<link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>


<div class="mb-4">

    <label class="form-label fw-bold">
        Reply
    </label>

    <div id="noteEditor"
         style="height:300px;background:white;">
    </div>

    <input
        type="hidden"
        name="acceptor_description_html"
        id="acceptor_description_html">

</div>


<div class="row mb-4">

    <div class="col-md-6">

        <label class="form-label fw-bold">
            CC
        </label>

        <select
            id="cc"
            name="cc"
            multiple
            class="form-select">

            {% for email in email_suggestions %}

                <option
                    value="{{ email }}"
                    {% if email in default_cc %}selected{% endif %}>

                    {{ email }}

                </option>

            {% endfor %}

        </select>

    </div>

    <div class="col-md-6">

        <label class="form-label fw-bold">
            BCC
        </label>

        <select
            id="bcc"
            name="bcc"
            multiple
            class="form-select">

            {% for email in email_suggestions %}

                <option
                    value="{{ email }}"
                    {% if email in default_bcc %}selected{% endif %}>

                    {{ email }}

                </option>

            {% endfor %}

        </select>

    </div>

</div>


<div class="mb-4">

    <label class="form-label fw-bold">
        Attachments
    </label>

    <input
        type="file"
        name="attachments"
        class="form-control"
        multiple>

</div>


<div class="d-flex gap-2 mb-4">

    <button
        type="submit"
        class="btn btn-primary">

        💬 Save & Notify Requestor

    </button>

    <a
        href="{{ url_for('dashboard') }}"
        class="btn btn-outline-secondary">

        Cancel

    </a>

</div>


<hr class="my-4">

<h4>

    🔄 Transfer Ticket

</h4>

<div class="row">

    <div class="col-md-6 mb-3">

        <label class="form-label">

            Transfer To

        </label>

        <select
            class="form-select"
            name="transfer_to">

            <option value="">
                -- Select Acceptor --
            </option>

            {% for user in acceptors %}

                {% if user != ticket["Assigned To"] %}

                    <option value="{{ user }}">
                        {{ user }}
                    </option>

                {% endif %}

            {% endfor %}

        </select>

    </div>

</div>

<div class="mb-3">

    <label class="form-label">

        Transfer Reason

    </label>

    <textarea
        class="form-control"
        rows="4"
        name="transfer_reason"
        placeholder="Reason for transferring this ticket..."></textarea>

</div>

<div class="d-flex gap-2">

    <button
        type="submit"
        formaction="{{ url_for('transfer_ticket', ticket_id=ticket['Ticket ID']) }}"
        formmethod="POST"
        class="btn btn-warning">

        🔄 Transfer Ticket

    </button>

</div>


<script>

const noteQuill = new Quill('#noteEditor', {

    theme: 'snow',

    placeholder: 'Write your reply to the requestor...',

    modules: {

        toolbar: [

            [{ font: [] }],
            [{ size: ['small', false, 'large', 'huge'] }],
            [{ header: [1,2,3,4,5,6,false] }],
            ['bold','italic','underline','strike'],
            [{ color: [] }, { background: [] }],
            [{ script:'sub' }, { script:'super' }],
            [{ list:'ordered' }, { list:'bullet' }],
            [{ indent:'-1' }, { indent:'+1' }],
            [{ align: [] }],
            ['blockquote','code-block'],
            ['link','image'],
            ['clean']

        ]

    }

});

new TomSelect("#cc", {

    plugins:["remove_button"],

    create:true,

    persist:false,

    maxOptions:100

});

new TomSelect("#bcc", {

    plugins:["remove_button"],

    create:true,

    persist:false,

    maxOptions:100

});

document
.getElementById("updateForm")
.addEventListener("submit", function () {

    document.getElementById(
        "acceptor_description_html"
    ).value = noteQuill.root.innerHTML;

});

</script>


</form>


{% endblock %}
