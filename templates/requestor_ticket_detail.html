{% extends "base.html" %}

{% block content %}

<a href="{{ url_for('my_tickets') }}" class="btn btn-link">
    ← My Tickets
</a>

<h3 class="mb-4">
    {{ ticket["Ticket ID"] }} — {{ ticket["Subject"] }}
</h3>


<!-- ===================================================== -->
<!-- Tom Select -->
<!-- ===================================================== -->

<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>


<!-- ===================================================== -->
<!-- Quill -->
<!-- ===================================================== -->

<link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>

<div class="mb-4">

    <label class="form-label fw-bold">

        Reply

    </label>

    <div
        id="replyEditor"
        style="height:300px;background:white;">

    </div>

    <input
        type="hidden"
        name="reply_html"
        id="reply_html">

</div>

<div class="row mb-4">

    <div class="col-md-6">

        <label class="form-label fw-bold">

            CC

        </label>

        <select
            id="cc"
            name="cc"
            multiple
            class="form-select">

            {% for email in email_suggestions %}

                <option
                    value="{{ email }}"
                    {% if email in default_cc %}selected{% endif %}>

                    {{ email }}

                </option>

            {% endfor %}

        </select>

    </div>

    <div class="col-md-6">

        <label class="form-label fw-bold">

            BCC

        </label>

        <select
            id="bcc"
            name="bcc"
            multiple
            class="form-select">

            {% for email in email_suggestions %}

                <option
                    value="{{ email }}"
                    {% if email in default_bcc %}selected{% endif %}>

                    {{ email }}

                </option>

            {% endfor %}

        </select>

    </div>

</div>

<div class="mb-4">

    <label class="form-label fw-bold">

        Attachments

    </label>

    <input
        type="file"
        name="attachments"
        class="form-control"
        multiple>

</div>

<div class="d-flex gap-2">

    <button
        class="btn btn-primary"
        type="submit">

        💬 Send Reply

    </button>

</div>

</form>

<!-- ===================================================== -->
<!-- Tom Select -->
<!-- ===================================================== -->

<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>


<!-- ===================================================== -->
<!-- Quill -->
<!-- ===================================================== -->

<link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>


<script>

const quill = new Quill('#replyEditor', {

    theme: 'snow',

    placeholder: 'Reply to the Data Team...',

    modules: {

        toolbar: [

            [{ font: [] }],

            [{ size: ['small', false, 'large', 'huge'] }],

            [{ header: [1,2,3,4,5,6,false] }],

            ['bold','italic','underline','strike'],

            [{ color: [] }, { background: [] }],

            [{ script:'sub' }, { script:'super' }],

            [{ list:'ordered' }, { list:'bullet' }],

            [{ indent:'-1' }, { indent:'+1' }],

            [{ align: [] }],

            ['blockquote','code-block'],

            ['link','image'],

            ['clean']

        ]

    }

});

// =====================================================
// Tom Select
// =====================================================

new TomSelect("#cc", {

    plugins: ["remove_button"],

    create: true,

    persist: false,

    maxOptions: 100,

    placeholder: "Add CC recipients..."

});


new TomSelect("#bcc", {

    plugins: ["remove_button"],

    create: true,

    persist: false,

    maxOptions: 100,

    placeholder: "Add BCC recipients..."

});

// =====================================================
// Submit
// =====================================================

document
.getElementById("replyForm")
.addEventListener("submit", function () {

    document.getElementById("reply_html").value =
        quill.root.innerHTML;

});

</script>

{% endblock %}
